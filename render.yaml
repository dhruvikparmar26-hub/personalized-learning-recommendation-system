# Render Blueprint — deploy backend + database + Redis in one click
# https://render.com/docs/blueprint-spec

services:
  # ── Backend API ───────────────────────────────────────────
  - type: web
    name: learnflow-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.api.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: learnflow-db
          property: connectionURI
      - key: REDIS_URL
        fromService:
          type: redis
          name: learnflow-redis
          property: connectionURI
      - key: ANTHROPIC_API_KEY
        sync: false  # user sets this manually in Render dashboard
      - key: CORS_ORIGINS
        value: '["https://your-frontend.vercel.app"]'
      - key: FRONTEND_URL
        value: https://your-frontend.vercel.app
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /api/health
    plan: free

  # ── Redis ─────────────────────────────────────────────────
  - type: redis
    name: learnflow-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru

# ── Database ──────────────────────────────────────────────
databases:
  - name: learnflow-db
    region: oregon
    plan: free
    databaseName: learning_rec
    user: learnflow
